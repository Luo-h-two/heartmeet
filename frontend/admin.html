<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心遇 - 管理后台</title>
  <link rel="stylesheet" href="admin.css?v=20260630" />
</head>

<body>
  <div id="adminApp">

    <!-- ====== 登录页 ====== -->
    <div id="loginPage" class="admin-login-page">
      <div class="login-card">
        <h2>🛡️ 心遇管理后台</h2>
        <p class="login-sub">请使用管理员账号登录</p>
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label>手机号</label>
            <input type="text" id="loginPhone" placeholder="请输入手机号" maxlength="11" />
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPwd" placeholder="请输入密码" />
          </div>
          <p id="loginError" class="error-msg" style="display:none"></p>
          <button type="submit" class="btn btn-filled login-btn">登录管理后台</button>
        </form>
      </div>
    </div>

    <!-- ====== 主面板（登录后可见） ====== -->
    <div id="mainPanel" style="display:none">
      <!-- 侧边栏 -->
      <aside class="admin-sidebar" id="sidebar">
        <div class="sidebar-brand">🛡️ 管理后台</div>
        <ul class="sidebar-menu" id="sidebarMenu">
          <li><a href="#" data-page="dashboard">📊 仪表盘</a></li>
          <li><a href="#" data-page="users">👥 用户管理</a></li>
          <li><a href="#" data-page="logs">📝 行为日志</a></li>
          <li><a href="#" data-page="actions">💝 交互记录</a></li>
          <li><a href="#" data-page="chats">💬 聊天监控</a></li>
          <li><a href="#" data-page="adminLogs">🔒 操作日志</a></li>
        </ul>
        <div class="sidebar-footer">
          <span id="adminInfo"></span>
          <button class="btn btn-sm btn-outline" onclick="alogout()">退出</button>
        </div>
      </aside>

      <!-- 内容区 -->
      <main class="admin-main" id="contentArea"></main>
    </div>

    <!-- ====== 通用弹窗 ====== -->
    <div id="modalOverlay" class="modal-overlay" style="display:none">
      <div class="modal-box" id="modalBox"></div>
    </div>

    <!-- Toast -->
    <div class="admin-toast-container" id="adminToast"></div>

  </div>

  <script type="module" src="admin.js?v=20260701"></script>
</body>

</html>
